name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit tests & lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Verify smoke script syntax
        run: node --check scripts/smoke-live-apis.mjs scripts/dev-server.mjs

  sam-validate:
    name: SAM template validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python (required by SAM CLI)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install AWS SAM CLI
        run: pip install aws-sam-cli

      - name: Validate SAM template
        run: sam validate --lint

  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: [test, sam-validate]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            eu-west-2

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: SAM build
        run: sam build --use-container

      - name: SAM deploy (staging)
        run: |
          sam deploy \
            --stack-name uk-financial-products-staging \
            --region eu-west-2 \
            --resolve-s3 \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              StageName=staging \
              GeminiApiKey=${{ secrets.GEMINI_API_KEY }} \
              AllowedOrigins="*" \
              CorsAllowOrigin="*" \
              CacheTtlSeconds=300 \
              EnableExchangeData=false

      - name: Smoke test staging
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name uk-financial-products-staging \
            --query "Stacks[0].Outputs[?OutputKey=='ApiBaseUrl'].OutputValue" \
            --output text)
          echo "Staging API: $API_URL"
          curl -sf "$API_URL/products/mortgages" | jq '.data.products | length'
